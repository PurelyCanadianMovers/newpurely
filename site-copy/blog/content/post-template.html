<!--
  Blog post template.

  Copy this file to:
  site-copy/blog/[post-name]/index.html

  Then replace:
  - PAGE_TITLE
  - META_DESCRIPTION
  - POST_SLUG
  - CATEGORY
  - H1
  - INTRO
  - IMAGE_URL
  - IMAGE_ALT
  - ARTICLE_BODY
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PAGE_TITLE</title>
    <meta name="description" content="META_DESCRIPTION" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://purelycanadianmovers.com/blog/POST_SLUG/" />
  </head>
  <body>
    <!-- Use the existing blog post pages as the styled template. -->
    <main>
      <article>
        <p class="breadcrumb"><a href="/blog/">Blog</a> / CATEGORY</p>
        <h1>H1</h1>
        <p>INTRO</p>
        <img src="IMAGE_URL" alt="IMAGE_ALT" />
        ARTICLE_BODY
      </article>
    </main>
  </body>
</html>
